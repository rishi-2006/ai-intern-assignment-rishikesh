<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Lead Capture Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Student Lead Capture Form</h1>

    <form id="leadForm">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name">
            <small class="error" id="nameError"></small>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email">
            <small class="error" id="emailError"></small>
        </div>

        <div class="form-group">
            <label>Country</label>
            <select id="country">
                <option value="">Select Country</option>
                <option>India</option>
                <option>USA</option>
                <option>Japan</option>
                <option>Germany</option>
            </select>
            <small class="error" id="countryError"></small>
        </div>

        <div class="form-group">
            <label>Course Level</label>

            <input type="radio" name="course" value="UG"> UG
            <input type="radio" name="course" value="PG"> PG
            <input type="radio" name="course" value="PhD"> PhD

            <small class="error" id="courseError"></small>
        </div>

        <div class="form-group">
            <label>Preferred University</label>
            <input type="text" id="university">
            <small class="error" id="universityError"></small>
        </div>

        <div class="form-group">
            <label>Message</label>

            <textarea id="message" maxlength="300"></textarea>

            <div class="counter">
                <span id="charCount">300</span> characters remaining
            </div>

            <small class="error" id="messageError"></small>
        </div>

        <button type="submit" id="submitBtn">
            Submit
        </button>

    </form>

    <div id="successMessage"></div>

</div>

<script src="script.js"></script>

</body>
</html>
